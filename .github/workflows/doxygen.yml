# @brief This workflow builds our documentation every time we push to a 
# feature branch and publishes the documentation to gh-page on release.

name: Docs
on: 
  release:
    types: [published]

  push:
    #uncomment if we switch to GitFlow
    #branches-ignore:
    #- main

  workflow_dispatch:
    inputs:
      publishDoc:
        description: 'Publish to gh-pages [yes/no]'     
        required: true
        default: 'no'

jobs:
  Build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Install dependencies
        run: |
          sudo apt-get install doxygen
          sudo apt-get install graphviz
          touch .nojekyll #disable page generator from GitHub
      
      - name: Run doxygen
        run: |
          mkdir -p ./build/doxygen
          doxygen

      - name: Deploy to GitHub Pages
        # if: github.event_name == 'release' || github.event.inputs.publishDoc == 'yes' #test without release
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs/book/_build # Source folder for gh-pages deploy
